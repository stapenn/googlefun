name: Deploy Cloud Function

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy ${{ vars.FUNCTION_NAME }} \
            --gen2 \
            --runtime=nodejs22 \
            --region=${{ vars.FUNCTION_REGION }} \
            --source=. \
            --entry-point=helloHttp \
            --trigger-http \
            --allow-unauthenticated \
            --set-env-vars "SMTP_USER=${{ secrets.SMTP_USER }},SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},SMTP_HOST=${{ vars.SMTP_HOST }},SMTP_PORT=${{ vars.SMTP_PORT }},MAIL_TO=${{ vars.MAIL_TO }},MAIL_TITLE=${{ vars.MAIL_TITLE }},MAIL_SUBJECT=${{ vars.MAIL_SUBJECT }},RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }},RECAPTCHA_MIN_SCORE=${{ vars.RECAPTCHA_MIN_SCORE }},RECAPTCHA_EXPECTED_ACTION=${{ vars.RECAPTCHA_EXPECTED_ACTION }}"
