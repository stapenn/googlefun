name: Deploy Cloud Function

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy function
        run: |
          gcloud functions deploy ${{ vars.FUNCTION_NAME }} \
            --gen2 \
            --runtime=nodejs22 \
            --region=${{ vars.FUNCTION_REGION }} \
            --source=. \
            --entry-point=${{ vars.FUNCTION_ENTRY_POINT }} \
            --trigger-http \
            --allow-unauthenticated \
            --set-env-vars SMTP_HOST=${{ secrets.SMTP_HOST }},SMTP_PORT=${{ secrets.SMTP_PORT }},SMTP_SECURE=${{ secrets.SMTP_SECURE }},SMTP_USER=${{ secrets.SMTP_USER }},SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},MAIL_TO=${{ secrets.MAIL_TO }}
